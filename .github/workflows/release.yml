name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller sortr.spec --noconfirm --clean

      - name: Prepare Windows asset
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -Path release-assets -ItemType Directory -Force | Out-Null
          Copy-Item dist/sortr-windows.exe release-assets/sortr-windows.exe

      - name: Prepare Linux asset
        if: runner.os == 'Linux'
        run: |
          mkdir -p release-assets
          chmod +x dist/sortr-linux
          cp dist/sortr-linux release-assets/sortr-linux

      - name: Prepare macOS asset
        if: runner.os == 'macOS'
        run: |
          mkdir -p release-assets
          ditto -c -k --sequesterRsrc --keepParent dist/SORTR.app release-assets/SORTR-macos.zip

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.os }}
          path: release-assets/*
          if-no-files-found: error

  release:
    name: Publish Release Assets
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          merge-multiple: true
          path: release-assets

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          overwrite_files: true